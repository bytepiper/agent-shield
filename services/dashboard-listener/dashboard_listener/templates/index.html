<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Shield Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="h-screen overflow-hidden bg-black font-mono text-xs text-zinc-100" data-testid="listener-dashboard-root">
  <div class="flex h-full flex-col" data-testid="listener-dashboard-shell">
    <div class="flex items-center gap-3 border-b border-zinc-800 px-4 py-3 text-[18px] font-semibold text-orange-300" data-testid="listener-dashboard-header">
      <svg viewBox="0 0 24 24" class="h-6 w-6 shrink-0 text-orange-300" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3l7 3v6c0 4.6-2.8 7.9-7 9-4.2-1.1-7-4.4-7-9V6l7-3z"></path>
        <path d="M9.5 12.5l1.8 1.8 3.7-4.1"></path>
      </svg>
      <span class="shrink-0" data-testid="listener-dashboard-title">Agent Shield</span>
      {% include "_stats.html" %}
    </div>
    {% include "_filters.html" %}
    <div class="flex min-h-0 flex-1" data-testid="listener-dashboard-main">
      <div class="flex-1 overflow-hidden" data-testid="listener-table-pane">
        {% include "_traffic.html" %}
      </div>
      <div id="detail-resizer" class="hidden w-2 cursor-col-resize bg-zinc-900 hover:bg-cyan-500/70 active:bg-cyan-400/80" data-testid="listener-detail-resizer"></div>
      <div id="detail-pane" class="flex h-full w-0 min-w-0 flex-col overflow-hidden border-l-0 bg-[#0a0a0a]" data-testid="listener-detail-pane">
        <div id="detail-content" class="h-full min-h-0" data-testid="listener-detail-content"></div>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
