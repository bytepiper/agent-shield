<div class="flex h-full min-h-0 flex-col" data-testid="listener-detail">
  <div class="flex items-start justify-between gap-4 border-b border-zinc-800 px-4 py-3" data-testid="listener-detail-header">
    <div class="min-w-0">
      <div class="truncate text-sm font-semibold text-orange-300" data-testid="listener-detail-domain">{{ detail.event.domain }}</div>
      <div class="mt-1 truncate text-xs text-zinc-500" data-testid="listener-detail-url">{{ detail.event.url }}</div>
    </div>
    <button class="text-xs text-zinc-500 hover:text-zinc-200" data-testid="listener-detail-close" type="button" onclick="closeDetailPane()">CLOSE</button>
  </div>
  <div class="flex border-b border-zinc-800" data-testid="listener-detail-tabs">
    {% for tab in detail.tabs %}
      <button
        class="border-b-2 px-3 py-2 text-[11px] {% if tab.active %}border-emerald-500 text-emerald-300{% else %}border-transparent text-zinc-500 hover:text-zinc-300{% endif %}"
        data-testid="listener-detail-tab-{{ tab.name }}"
        onclick="rememberDetailSelection({{ detail.event.listener_id }}, '{{ tab.name }}')"
        hx-get="/fragments/detail/{{ detail.event.listener_id }}?tab={{ tab.name }}"
        hx-target="#detail-content"
        hx-swap="innerHTML"
      >{{ tab.label }}</button>
    {% endfor %}
  </div>
  <div class="min-h-0 flex-1 overflow-y-auto overflow-x-hidden p-4" data-testid="listener-detail-body">
    {{ detail.content_html }}
  </div>
</div>
